<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="在线考试系统——分课程分章节组卷、限时作答（10-60分钟）、自动批改计分、错题汇总与知识点解析、历史成绩记录。">
<title>在线考试 - 学生学习系统</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
.chapter-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin: 12px 0; }
.chapter-select-grid label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); transition: all var(--transition); }
.chapter-select-grid label:hover { background: var(--primary-light); border-color: var(--primary); }
.chapter-select-grid label.checked { background: var(--primary-light); border-color: var(--primary); }
.chapter-select-grid input[type="checkbox"] { accent-color: var(--primary); }
.select-all-btn { font-size: 12px; color: var(--primary); cursor: pointer; margin-left: 8px; }
</style>
</head>
<body data-page="exam">

<nav class="navbar">
  <div class="logo"><a href="index.html"><span>&#x1F4DA;</span> 学习系统</a></div>
  <button class="menu-toggle" id="menuToggle">&#x2630;</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html" data-page="home">首页</a></li>
    <li><a href="profile.html" data-page="profile">学生简介</a></li>
    <li><a href="learning.html" data-page="learning">知识点学习</a></li>
    <li><a href="practice.html" data-page="practice">专项练习</a></li>
    <li><a href="exam.html" data-page="exam">在线考试</a></li>
    <li><a href="notes.html" data-page="notes">学习笔记</a></li>
  </ul>
</nav>

<div class="page-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">课程章节目录</div>
    <div class="course-group" id="sidebarCourses"></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <main class="main-content">
    <div id="examContent"></div>
  </main>
</div>

<button id="mobileSidebarBtn">&#x2630; 目录</button>

<script src="common.js" defer></script>
<script>
var examQuestions = [];
var examState = {
  started: false, submitted: false, timeLeft: 1800,
  answers: {}, currentQ: 0, timer: null,
  selectedCourse: null
};

function renderExam() {
  var container = document.getElementById('examContent');

  if (!examState.started) {
    renderExamSetup(container);
    return;
  }

  if (examState.submitted) {
    showExamResult(container);
    return;
  }

  renderExamQuestion(container);
}

function renderExamSetup(container) {
  var html = '<div class="card"><h2><i class="fa-solid fa-pen-to-square"></i> 分章节在线考试</h2>' +
    '<p>选择考试范围：指定课程和章节，系统从所选章节中随机抽取题目生成试卷。</p>';

  // 课程选择
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;" id="examCourseTabs"></div>';

  // 章节选择
  html += '<div id="examChapterSelect" style="margin:8px 0;"></div>';

  // 考试设置
  html += '<div style="margin-top:16px;padding:16px;background:var(--primary-light);border-radius:var(--radius);">' +
    '<p style="font-size:14px;"><strong>考试设置</strong></p>' +
    '<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:8px;">' +
      '<span>考试时长：<select id="examDuration" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;">' +
        '<option value="600">10 分钟</option><option value="1200">20 分钟</option><option value="1800" selected>30 分钟</option><option value="2700">45 分钟</option><option value="3600">60 分钟</option></select></span>' +
    '</div>' +
    '<p style="font-size:12px;margin-top:4px;color:var(--text-secondary);" id="examQuestionCount">已选题目：计算中...</p>' +
  '</div>';

  html += '<button class="btn btn-primary" style="margin-top:16px;font-size:16px;padding:10px 30px;" onclick="startExam()">开始考试</button>';

  // 历史成绩
  var examHistory = getState('examHistory', []);
  if (examHistory.length > 0) {
    html += '<div style="margin-top:20px;"><h4>历史成绩记录</h4><table class="data-table"><tr><th>日期</th><th>范围</th><th>得分</th><th>正确/总题</th></tr>';
    examHistory.slice(-8).reverse().forEach(function(h) {
      html += '<tr><td>' + h.date + '</td><td>' + (h.scope || '综合') + '</td><td>' + h.score + '分</td><td>' + h.correct + '/' + h.total + '</td></tr>';
    });
    html += '</table></div>';
  }

  container.innerHTML = html;

  // 渲染课程Tab
  renderExamCourseTabs();
  updateExamChapterSelect();
}

function renderExamCourseTabs() {
  var tabs = document.getElementById('examCourseTabs');
  if (!tabs) return;
  var html = '<a href="javascript:void(0)" class="btn btn-sm ' + (examState.selectedCourse === null ? 'btn-primary' : 'btn-outline') + '" onclick="examState.selectedCourse=null;updateExamChapterSelect();renderExamCourseTabs();">全部课程</a>';
  courses.forEach(function(c) {
    html += '<a href="javascript:void(0)" class="btn btn-sm ' + (examState.selectedCourse === c.id ? 'btn-primary' : 'btn-outline') + '" onclick="examState.selectedCourse=\'' + c.id + '\';updateExamChapterSelect();renderExamCourseTabs();">' + c.icon + ' ' + c.title + '</a>';
  });
  tabs.innerHTML = html;
}

function updateExamChapterSelect() {
  var container = document.getElementById('examChapterSelect');
  if (!container) return;
  var selected = examState.selectedCourse;

  var coursesToShow = selected ? courses.filter(function(c) { return c.id === selected; }) : courses;
  var html = '';
  coursesToShow.forEach(function(c) {
    html += '<div style="margin-bottom:8px;"><strong>' + c.icon + ' ' + c.title + '</strong> <a href="javascript:void(0)" class="select-all-btn" onclick="toggleAllChapters(\'' + c.id + '\')">全选</a></div>';
    html += '<div class="chapter-select-grid" id="chapter-grid-' + c.id + '">';
    c.chapters.forEach(function(ch, i) {
      html += '<label id="ch-label-' + c.id + '-' + i + '" class="checked" onclick="toggleChapterCheck(this)">' +
        '<input type="checkbox" checked data-course="' + c.id + '" data-chapter="' + i + '"> ' + ch.title.replace(/第\d+章 /, '') + '</label>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
  updateQuestionCount();
}

function toggleChapterCheck(label) {
  label.classList.toggle('checked');
  var cb = label.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  updateQuestionCount();
}

function toggleAllChapters(courseId) {
  var grid = document.getElementById('chapter-grid-' + courseId);
  if (!grid) return;
  var labels = grid.querySelectorAll('label');
  var allChecked = true;
  labels.forEach(function(l) { if (!l.classList.contains('checked')) allChecked = false; });

  labels.forEach(function(l) {
    var cb = l.querySelector('input[type="checkbox"]');
    if (allChecked) { l.classList.remove('checked'); cb.checked = false; }
    else { l.classList.add('checked'); cb.checked = true; }
  });
  updateQuestionCount();
}

function updateQuestionCount() {
  var count = 0;
  document.querySelectorAll('.chapter-select-grid input[type="checkbox"]:checked').forEach(function(cb) {
    var cid = cb.dataset.course;
    var ch = cb.dataset.chapter;
    if (chapterExercises[cid] && chapterExercises[cid][ch]) {
      count += chapterExercises[cid][ch].length;
    }
  });
  var el = document.getElementById('examQuestionCount');
  if (el) el.textContent = '已选题目：' + count + ' 道' + (count === 0 ? '（请至少选择一章）' : '');
}

function startExam() {
  // 收集选中的题目
  examQuestions = [];
  document.querySelectorAll('.chapter-select-grid input[type="checkbox"]:checked').forEach(function(cb) {
    var cid = cb.dataset.course;
    var ch = cb.dataset.chapter;
    if (chapterExercises[cid] && chapterExercises[cid][ch]) {
      chapterExercises[cid][ch].forEach(function(q) {
        examQuestions.push({ q: q, course: cid, chapter: ch });
      });
    }
  });

  if (examQuestions.length === 0) { alert('请至少选择一章题目！'); return; }

  // 随机打乱
  for (var i = examQuestions.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = examQuestions[i]; examQuestions[i] = examQuestions[j]; examQuestions[j] = t;
  }

  var duration = parseInt(document.getElementById('examDuration').value);

  examState.started = true;
  examState.submitted = false;
  examState.answers = {};
  examState.timeLeft = duration;
  examState.currentQ = 0;
  if (examState.timer) clearInterval(examState.timer);
  examState.timer = setInterval(function() {
    examState.timeLeft--;
    var el = document.getElementById('examTimer');
    if (el) { el.textContent = formatTime(examState.timeLeft); if (examState.timeLeft <= 300) el.style.color = 'var(--danger)'; }
    if (examState.timeLeft <= 0) { clearInterval(examState.timer); submitExam(); }
  }, 1000);
  renderExam();
}

function renderExamQuestion(container) {
  var qIdx = examState.currentQ;
  var eq = examQuestions[qIdx];
  var q = eq.q;

  container.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><h3>在线考试中...</h3><div class="timer" id="examTimer">' + formatTime(examState.timeLeft) + '</div></div></div>' +
    '<div class="quiz-card" id="exam-quiz-' + qIdx + '">' +
      '<div class="q-header"><span class="q-num">第' + (qIdx+1) + '题 / 共' + examQuestions.length + '题</span>' +
      '<span class="q-type tag ' + (q.type==='single'?'tag-blue':q.type==='multi'?'tag-yellow':q.type==='judge'?'tag-green':'tag-red') + '">' +
      (q.type==='single'?'单选题':q.type==='multi'?'多选题':q.type==='judge'?'判断题':'填空题') + '</span></div>' +
      '<div class="q-text">' + q.q + '</div>' +
      renderExamOptions(q, qIdx) +
    '</div>' +
    '<div class="exam-nav">' +
      '<button class="btn btn-outline" onclick="prevExamQ()"' + (qIdx === 0 ? ' disabled' : '') + '>← 上一题</button>' +
      '<span class="q-indicator">' + (qIdx+1) + ' / ' + examQuestions.length + '</span>' +
      '<button class="btn btn-outline" onclick="nextExamQ()">' + (qIdx === examQuestions.length - 1 ? '提交试卷' : '下一题 →') + '</button>' +
    '</div>' +
    '<button class="btn btn-danger" style="width:100%;margin-top:12px;" onclick="submitExam()">提交试卷</button>';
  restoreExamUI(q, qIdx);
}

function renderExamOptions(q, qIdx) {
  var h = '';
  if (q.type === 'single') {
    q.options.forEach(function(opt, j) { h += '<label class="option" id="exam-opt-' + qIdx + '-' + j + '" onclick="selectExamSingle(' + qIdx + ', ' + j + ')"><input type="radio" name="exam-q' + qIdx + '" value="' + j + '" style="margin-right:8px;">' + String.fromCharCode(65+j) + '. ' + opt + '</label>'; });
  } else if (q.type === 'multi') {
    q.options.forEach(function(opt, j) { h += '<label class="option" id="exam-opt-' + qIdx + '-' + j + '" onclick="selectExamMulti(' + qIdx + ', ' + j + ')"><input type="checkbox" name="exam-q' + qIdx + '" value="' + j + '" style="margin-right:8px;">' + String.fromCharCode(65+j) + '. ' + opt + '</label>'; });
  } else if (q.type === 'judge') {
    h += '<label class="option" id="exam-opt-' + qIdx + '-0" onclick="selectExamSingle(' + qIdx + ', 0)"><input type="radio" name="exam-q' + qIdx + '" value="0" style="margin-right:8px;">正确</label><label class="option" id="exam-opt-' + qIdx + '-1" onclick="selectExamSingle(' + qIdx + ', 1)"><input type="radio" name="exam-q' + qIdx + '" value="1" style="margin-right:8px;">错误</label>';
  } else {
    h += '<input type="text" id="exam-fill-' + qIdx + '" placeholder="请输入答案..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;">';
  }
  return h;
}

function selectExamSingle(qIdx, optIdx) {
  examState.answers[qIdx] = optIdx;
  var card = document.getElementById('exam-quiz-' + qIdx);
  if (card) { var opts = card.querySelectorAll('.option'); for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected'); }
  var o = document.getElementById('exam-opt-' + qIdx + '-' + optIdx);
  if (o) o.classList.add('selected');
}

function selectExamMulti(qIdx, optIdx) {
  if (!examState.answers[qIdx]) examState.answers[qIdx] = [];
  var arr = examState.answers[qIdx];
  var idx = arr.indexOf(optIdx);
  if (idx > -1) arr.splice(idx, 1); else arr.push(optIdx);
  document.getElementById('exam-opt-' + qIdx + '-' + optIdx).classList.toggle('selected');
}

function saveExamAnswer(qIdx) {
  var q = examQuestions[qIdx].q;
  if (q.type === 'fill') { var input = document.getElementById('exam-fill-' + qIdx); examState.answers[qIdx] = input ? input.value.trim() : ''; }
  else if (q.type === 'multi') { var cb = document.querySelectorAll('input[name="exam-q' + qIdx + '"]:checked'); examState.answers[qIdx] = Array.from(cb).map(function(c) { return parseInt(c.value); }); }
  else { var sel = document.querySelector('input[name="exam-q' + qIdx + '"]:checked'); examState.answers[qIdx] = sel ? parseInt(sel.value) : null; }
}

function restoreExamUI(q, qIdx) {
  if (examState.answers[qIdx] === undefined || examState.answers[qIdx] === null) return;
  if (q.type === 'multi') {
    (examState.answers[qIdx] || []).forEach(function(v) { var o = document.getElementById('exam-opt-' + qIdx + '-' + v); if (o) o.classList.add('selected'); });
  } else if (q.type === 'fill') {
    var input = document.getElementById('exam-fill-' + qIdx); if (input) input.value = examState.answers[qIdx];
  } else {
    var o = document.getElementById('exam-opt-' + qIdx + '-' + examState.answers[qIdx]); if (o) o.classList.add('selected');
  }
}

function nextExamQ() {
  saveExamAnswer(examState.currentQ);
  if (examState.currentQ === examQuestions.length - 1) { submitExam(); return; }
  examState.currentQ++;
  renderExam();
}

function prevExamQ() {
  if (examState.currentQ > 0) { saveExamAnswer(examState.currentQ); examState.currentQ--; renderExam(); }
}

function submitExam() {
  saveExamAnswer(examState.currentQ);
  if (examState.timer) clearInterval(examState.timer);
  examState.submitted = true;
  var correct = 0;
  examQuestions.forEach(function(eq, i) {
    if (checkExamAnswer(eq.q, examState.answers[i])) correct++;
  });
  var score = examQuestions.length > 0 ? Math.round(correct / examQuestions.length * 100) : 0;
  var scopeName = examState.selectedCourse || '综合';
  var examHistory = getState('examHistory', []);
  examHistory.push({ date: new Date().toLocaleDateString('zh-CN'), score: score, correct: correct, total: examQuestions.length, scope: scopeName });
  setState('examHistory', examHistory);
  renderExam();
}

function checkExamAnswer(q, userAnswer) {
  if (userAnswer === undefined || userAnswer === null || userAnswer === '') return false;
  if (q.type === 'multi') { var correct = q.answer.slice().sort().join(','); var user = (userAnswer || []).slice().sort().join(','); return correct === user; }
  if (q.type === 'fill') return userAnswer.replace(/\s+/g, '') === q.answer.replace(/\s+/g, '');
  if (q.type === 'judge') return (userAnswer === 0 && q.answer === true) || (userAnswer === 1 && q.answer === false);
  return userAnswer === q.answer;
}

function showExamResult(container) {
  var correct = 0; var wrongQuestions = [];
  examQuestions.forEach(function(eq, i) {
    if (checkExamAnswer(eq.q, examState.answers[i])) correct++;
    else wrongQuestions.push({q: eq.q, idx: i, course: eq.course, chapter: eq.chapter});
  });
  var score = examQuestions.length > 0 ? Math.round(correct / examQuestions.length * 100) : 0;
  var html = '<div class="card score-card"><h2>考试完成！</h2><div class="score">' + score + '</div><p style="font-size:18px;">正确 ' + correct + ' / ' + examQuestions.length + ' 题</p>';
  if (score >= 80) html += '<p style="color:var(--success);"><i class="fa-solid fa-trophy"></i> 优秀！你对知识点掌握得很好！</p>';
  else if (score >= 60) html += '<p style="color:var(--warning);"><i class="fa-solid fa-book"></i> 不错，继续加油！</p>';
  else html += '<p style="color:var(--danger);"><i class="fa-solid fa-book-open-reader"></i> 需要加强学习，建议回顾各章节。</p>';
  html += '</div>';

  if (wrongQuestions.length > 0) {
    html += '<div class="card"><h3>错题汇总（' + wrongQuestions.length + ' 道）</h3>';
    wrongQuestions.forEach(function(wq) {
      var userAnswer = examState.answers[wq.idx];
      html += '<div class="quiz-card"><p><strong>第' + (wq.idx+1) + '题</strong> <span class="tag tag-red">答错</span></p><p>' + wq.q.q + '</p>' +
        '<p style="color:var(--danger);">你的答案：' + formatExamAnswer(wq.q, userAnswer) + '</p>' +
        '<p style="color:var(--success);">正确答案：' + formatExamCorrectAnswer(wq.q) + '</p>' +
        '<p style="color:var(--text-secondary);">解析：' + wq.q.explain + '</p></div>';
    });
    html += '</div>';
  }
  html += '<button class="btn btn-primary" onclick="examState.started=false;examState.submitted=false;examState.answers={};renderExam();">重新考试</button>';
  container.innerHTML = html;
}

function formatExamAnswer(q, ans) {
  if (ans === undefined || ans === null || ans === '') return '（未作答）';
  if (q.type === 'multi') return (ans || []).map(function(a) { return q.options[a]; }).join('、');
  if (q.type === 'judge') return ans === 0 ? '正确' : '错误';
  if (q.type === 'fill') return ans;
  return q.options ? q.options[ans] : ans;
}

function formatExamCorrectAnswer(q) {
  if (q.type === 'multi') return q.answer.map(function(a) { return q.options[a]; }).join('、');
  if (q.type === 'judge') return q.answer ? '正确' : '错误';
  if (q.type === 'fill') return q.answer;
  return q.options ? q.options[q.answer] : q.answer;
}

function formatTime(seconds) {
  var m = Math.floor(seconds / 60); var s = seconds % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

renderSidebar(null, null);
renderExam();
setupMobile();
</script>
</body>
</html>
