<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="商务数据分析与应用专业学生学习系统——在线学习Python编程、数据分析技术、数据采集与处理、供应链数据分析四大课程，提供代码编辑器、章节练习和在线考试。">
<title>首页 - 学生学习系统</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-page="home">

<!-- ========== 导航栏 ========== -->
<nav class="navbar">
  <div class="logo"><a href="index.html"><span>&#x1F4DA;</span> 学习系统</a></div>
  <button class="menu-toggle" id="menuToggle" aria-label="菜单">&#x2630;</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html" data-page="home">首页</a></li>
    <li><a href="profile.html" data-page="profile">学生简介</a></li>
    <li><a href="learning.html" data-page="learning">知识点学习</a></li>
    <li><a href="practice.html" data-page="practice">专项练习</a></li>
    <li><a href="exam.html" data-page="exam">在线考试</a></li>
    <li><a href="notes.html" data-page="notes">学习笔记</a></li>
  </ul>
</nav>

<div class="page-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">课程章节目录</div>
    <div class="course-group" id="sidebarCourses"></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content">
    <div class="card">
      <h2>欢迎回来，徐晓帆 &#x1F44B;</h2>
      <p>商务数据分析与应用专业 · 学习平台</p>
      <div class="progress-label" style="margin-top:16px;">
        <span>整体学习进度</span>
        <span id="overallProgressText">0%</span>
      </div>
      <div class="progress-bar" style="height:10px;margin:8px 0 16px;">
        <div class="fill" id="overallProgressBar" style="width:0%;"></div>
      </div>
    </div>

    <div class="course-grid" id="homeCourseGrid"></div>

    <div class="card" style="margin-top:16px;">
      <h3>学习座右铭</h3>
      <blockquote style="font-style:italic;color:var(--text-secondary);font-size:15px;border-left:3px solid var(--primary);padding-left:16px;">
        "数据驱动决策，分析创造价值。每一天的学习都是通向数据科学家的阶梯。"
      </blockquote>
    </div>
  </main>
</div>

<button id="mobileSidebarBtn">&#x2630; 目录</button>

<script src="common.js"></script>
<script>
(function() {
  var grid = document.getElementById('homeCourseGrid');
  if (!grid) return;
  var html = '';
  courses.forEach(function(c) {
    html += '<a href="learning.html?course=' + c.id + '" class="course-card">' +
      '<div class="icon">' + c.icon + '</div>' +
      '<h4>' + c.title + '</h4>' +
      '<p>' + c.desc + '</p>' +
      '<div style="margin-top:10px;">' +
        '<span class="tag tag-blue">' + c.chapters.length + ' 个章节</span>' +
        '<span style="font-size:12px;color:var(--text-secondary);margin-left:8px;">点击进入学习 →</span>' +
      '</div>' +
    '</a>';
  });
  grid.innerHTML = html;
  renderSidebar(null, null);
  updateProgress();
  setupMobile();
})();
</script>

</body>
</html>
